<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: #00abf0;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #00abf0;
        }
        
        .messages-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .message-item:hover {
            background: #f9f9f9;
        }
        
        .message-item.unread {
            background: #f0f9ff;
            border-left: 4px solid #00abf0;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .message-name {
            font-weight: bold;
            color: #333;
        }
        
        .message-date {
            color: #999;
            font-size: 12px;
        }
        
        .message-email {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .message-preview {
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .close {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }
        
        .message-full {
            margin-top: 20px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-unread {
            background: #ff9800;
            color: white;
        }
        
        .status-read {
            background: #4caf50;
            color: white;
        }
        
        .status-replied {
            background: #2196f3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Portfolio Admin Dashboard</h1>
            <p>Manage contact form submissions</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Messages</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Unread</h3>
                <div class="number" id="unreadCount">0</div>
            </div>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; padding: 40px;">Loading messages...</div>
        </div>
    </div>
    
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Message Details</h2>
                <span class="close">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api/contact';
        
        async function loadMessages() {
            try {
                const response = await fetch(`${API_BASE}/messages`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalCount').textContent = data.pagination.total;
                    document.getElementById('unreadCount').textContent = data.pagination.unread;
                    displayMessages(data.data);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('messagesContainer').innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: red;">Error loading messages. Make sure the server is running.</div>';
            }
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">No messages yet.</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message-item ${msg.status === 'unread' ? 'unread' : ''}" onclick="viewMessage(${msg.id})">
                    <div class="message-header">
                        <span class="message-name">${escapeHtml(msg.name)}</span>
                        <span class="message-date">${new Date(msg.created_at).toLocaleString()}</span>
                    </div>
                    <div class="message-email">${escapeHtml(msg.email)}</div>
                    <div class="message-preview">${escapeHtml(msg.message.substring(0, 100))}${msg.message.length > 100 ? '...' : ''}</div>
                    <div style="margin-top: 10px;">
                        <span class="status-badge status-${msg.status}">${msg.status}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function viewMessage(id) {
            try {
                const response = await fetch(`${API_BASE}/messages/${id}`);
                const data = await response.json();
                
                if (data.success) {
                    const modal = document.getElementById('messageModal');
                    const modalBody = document.getElementById('modalBody');
                    
                    modalBody.innerHTML = `
                        <div class="message-full">
                            <p><strong>Name:</strong> ${escapeHtml(data.data.name)}</p>
                            <p><strong>Email:</strong> ${escapeHtml(data.data.email)}</p>
                            <p><strong>Date:</strong> ${new Date(data.data.created_at).toLocaleString()}</p>
                            <p><strong>Status:</strong> <span class="status-badge status-${data.data.status}">${data.data.status}</span></p>
                            <p><strong>Message:</strong></p>
                            <p style="background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 10px;">
                                ${escapeHtml(data.data.message)}
                            </p>
                            <div style="margin-top: 20px;">
                                <button onclick="updateStatus(${data.data.id}, 'read')" class="status-btn">Mark as Read</button>
                                <button onclick="updateStatus(${data.data.id}, 'replied')" class="status-btn">Mark as Replied</button>
                                <button onclick="deleteMessage(${data.data.id})" style="background: #f44336;">Delete</button>
                            </div>
                        </div>
                    `;
                    
                    modal.style.display = 'flex';
                    
                    // Reload messages to update unread count
                    loadMessages();
                }
            } catch (error) {
                console.error('Error viewing message:', error);
                alert('Error loading message details');
            }
        }
        
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE}/messages/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    closeModal();
                    loadMessages();
                    alert('Status updated successfully');
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
            }
        }
        
        async function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this message?')) {
                try {
                    const response = await fetch(`${API_BASE}/messages/${id}`, {
                        method: 'DELETE'
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        closeModal();
                        loadMessages();
                        alert('Message deleted successfully');
                    }
                } catch (error) {
                    console.error('Error deleting message:', error);
                    alert('Error deleting message');
                }
            }
        }
        
        function closeModal() {
            document.getElementById('messageModal').style.display = 'none';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Modal close handlers
        document.querySelector('.close').onclick = closeModal;
        window.onclick = function(event) {
            const modal = document.getElementById('messageModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        // Load messages on page load
        loadMessages();
        
        // Refresh every 30 seconds
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
